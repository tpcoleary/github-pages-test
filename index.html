<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="card">
      <p class="eyebrow">GitHub Pages Test</p>
      <h1>Static Site Publish Check</h1>
      <p class="lede">
        This is a minimal test app to verify GitHub repo creation, push, and GitHub Pages publishing.
      </p>
      <div class="actions">
        <button id="ping-btn" type="button">Run Test Action</button>
        <span id="status" class="status">Waiting</span>
      </div>
      <ul class="facts">
        <li>Repo-backed static HTML</li>
        <li>No framework build required</li>
        <li>Suitable for direct GitHub Pages branch deployment</li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
